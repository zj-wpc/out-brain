---
layout: default
---
<h2>📋 全部存档</h2>
<ul>
{% for post in site.posts %}
  <li>
    <span>{{ post.date | date: "%Y-%m-%d" }}</span> —
    <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
    {% if post.categories %}
      {% for cat in post.categories %}
        <span class="category-tag">{{ cat }}</span>
      {% endfor %}
    {% endif %}
  </li>
{% endfor %}
</ul>
