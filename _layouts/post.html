---
layout: default
---
<article>
  <a href="{{ site.baseurl }}/posts/" class="back-link">← 返回存档</a>

  <header>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      📅 {{ page.date | date: "%Y-%m-%d %H:%M" }}
      {% if page.categories %}
        {% for cat in page.categories %}
          <span class="category-tag">{{ cat }}</span>
        {% endfor %}
      {% endif %}
    </p>
  </header>

  {{ content }}
</article>
